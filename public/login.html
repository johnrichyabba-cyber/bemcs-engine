<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BE-MCs Login</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="auth-body">
  <div class="login-card">
    <div class="login-brand">MarineTraffic Group Limited</div>

    <h1>Bandari Electronic Monitoring and Control System (BE-MCs)</h1>

    <div class="gold-pill">BANDARI SALAMA AFRIKA</div>

    <div class="section-title" style="margin-bottom:10px;">System Login</div>
    <p class="login-subtitle">
      Enter your authorized username and password to access the operational control environment.
    </p>

    <form id="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input class="input" type="text" id="username" placeholder="Enter username" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input class="input" type="password" id="password" placeholder="Enter password" required />
      </div>

      <button class="btn btn-gold" style="width:100%;" type="submit">Login</button>
      <div id="login-message" class="message"></div>
    </form>
  </div>

  <script>
    document.getElementById("login-form").addEventListener("submit", async function (e) {
      e.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const message = document.getElementById("login-message");

      message.classList.remove("error");
      message.textContent = "Signing in...";

      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Login failed");
        }

        window.location.href = "/dashboard";
      } catch (error) {
        message.classList.add("error");
        message.textContent = error.message;
      }
    });
  </script>
</body>
</html>
