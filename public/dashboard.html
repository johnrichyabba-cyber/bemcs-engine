<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BE-MCs Dashboard</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body style="font-family: sans-serif; padding: 40px;">
  <div style="max-width: 1100px; margin: 0 auto;">
    <div style="display: flex; justify-content: space-between; align-items: center; gap: 20px; flex-wrap: wrap;">
      <div>
        <h1>🎉 Welcome to BE-MCs Dashboard</h1>
        <p>Persistent PostgreSQL-backed session auth is now active.</p>
      </div>
      <button id="logout-btn" style="padding: 10px 18px; cursor: pointer;">Logout</button>
    </div>

    <hr style="margin: 24px 0;" />

    <div style="padding: 20px; border: 1px solid #ddd; border-radius: 12px; margin-bottom: 20px;">
      <h2>Current User</h2>
      <p><strong>Username:</strong> <span id="user-username">Loading...</span></p>
      <p><strong>Role:</strong> <span id="user-role">Loading...</span></p>
      <p><strong>Session State:</strong> Persistent session stored in PostgreSQL</p>
    </div>

    <div style="padding: 20px; border: 1px solid #ddd; border-radius: 12px; margin-bottom: 20px;">
      <h2>Available Modules</h2>
      <div id="module-links" style="display: grid; gap: 12px;"></div>
    </div>

    <div id="admin-panel" style="padding: 20px; border: 1px solid #ddd; border-radius: 12px; display: none;">
      <h2>Create New User</h2>
      <form id="create-user-form" style="display: grid; gap: 12px; max-width: 500px;">
        <input id="new-username" type="text" placeholder="New username" required />
        <input id="new-password" type="password" placeholder="New password" required />
        <input id="new-role" type="text" placeholder="Role e.g. admin / operations / accounts / customs" required />
        <button type="submit" style="padding: 10px 16px; cursor: pointer;">Create User</button>
      </form>
      <p id="create-user-message" style="margin-top: 12px;"></p>
    </div>
  </div>

  <script>
    const roleModules = {
      admin: [
        { name: "About System", href: "/about" },
        { name: "Tracking", href: "/tracking" },
        { name: "Shipment Registry", href: "/shipment-registry" },
        { name: "Registry Detail", href: "/registry-detail" },
        { name: "Accounting", href: "/accounting" },
        { name: "System Health", href: "/system-health" }
      ],
      operations: [
        { name: "Tracking", href: "/tracking" },
        { name: "Shipment Registry", href: "/shipment-registry" },
        { name: "Registry Detail", href: "/registry-detail" }
      ],
      accounts: [
        { name: "Accounting", href: "/accounting" }
      ],
      customs: [
        { name: "Tracking", href: "/tracking" },
        { name: "System Health", href: "/system-health" }
      ]
    };

    async function loadUser() {
      try {
        const response = await fetch("/api/me");
        if (!response.ok) {
          window.location.href = "/login";
          return;
        }

        const data = await response.json();
        if (!data.success || !data.user) {
          window.location.href = "/login";
          return;
        }

        const user = data.user;
        document.getElementById("user-username").textContent = user.username || "-";
        document.getElementById("user-role").textContent = user.role || "-";

        const links = roleModules[user.role] || [];
        const linksContainer = document.getElementById("module-links");

        if (!links.length) {
          linksContainer.innerHTML = "<p>No modules available for this role.</p>";
        } else {
          linksContainer.innerHTML = links
            .map(
              (item) =>
                `<a href="${item.href}" style="padding: 12px 16px; border: 1px solid #ddd; border-radius: 10px; text-decoration: none;">${item.name}</a>`
            )
            .join("");
        }

        if (user.role === "admin") {
          document.getElementById("admin-panel").style.display = "block";
        }
      } catch (error) {
        window.location.href = "/login";
      }
    }

    document.getElementById("logout-btn").addEventListener("click", async function () {
      try {
        const response = await fetch("/logout", { method: "POST" });
        const data = await response.json();
        window.location.href = data.redirect || "/login";
      } catch (error) {
        window.location.href = "/login";
      }
    });

    document.getElementById("create-user-form").addEventListener("submit", async function (e) {
      e.preventDefault();

      const message = document.getElementById("create-user-message");
      const username = document.getElementById("new-username").value.trim();
      const password = document.getElementById("new-password").value.trim();
      const role = document.getElementById("new-role").value.trim();

      message.textContent = "Creating user...";

      try {
        const response = await fetch("/api/users", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ username, password, role })
        });

        const data = await response.json();

        if (!response.ok || !data.success) {
          throw new Error(data.error || "Failed to create user");
        }

        message.textContent = `User created: ${data.user.username} (${data.user.role})`;
        document.getElementById("create-user-form").reset();
      } catch (error) {
        message.textContent = error.message;
      }
    });

    loadUser();
  </script>
</body>
</html>
