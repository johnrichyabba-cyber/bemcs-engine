<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shipment Registry</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body style="font-family: sans-serif; padding: 40px;">
  <div style="max-width: 1200px; margin: 0 auto;">
    <div style="display: flex; justify-content: space-between; align-items: center; gap: 20px; flex-wrap: wrap;">
      <div>
        <h1>📦 Shipment Registry</h1>
        <p>Create, view, and manage shipment records.</p>
      </div>
      <div style="display: flex; gap: 10px; flex-wrap: wrap;">
        <a href="/dashboard" style="padding: 10px 16px; border: 1px solid #ddd; border-radius: 10px; text-decoration: none;">Back to Dashboard</a>
        <button id="logout-btn" style="padding: 10px 16px; cursor: pointer;">Logout</button>
      </div>
    </div>

    <hr style="margin: 24px 0;" />

    <div style="padding: 20px; border: 1px solid #ddd; border-radius: 12px; margin-bottom: 20px;">
      <h2>Current User</h2>
      <p><strong>Username:</strong> <span id="user-username">Loading...</span></p>
      <p><strong>Role:</strong> <span id="user-role">Loading...</span></p>
    </div>

    <div id="create-shipment-panel" style="padding: 20px; border: 1px solid #ddd; border-radius: 12px; margin-bottom: 20px; display: none;">
      <h2>Create Shipment</h2>
      <form id="shipment-form" style="display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px;">
        <input id="client_name" type="text" placeholder="Client Name" required />
        <input id="reference_number" type="text" placeholder="Reference Number" required />
        <input id="shipping_line" type="text" placeholder="Shipping Line" required />
        <input id="status" type="text" placeholder="Status (e.g. Pending)" />
        <input id="origin_port" type="text" placeholder="Origin Port" />
        <input id="destination_port" type="text" placeholder="Destination Port" />
        <textarea id="cargo_description" placeholder="Cargo Description" style="grid-column: 1 / -1; min-height: 100px;" required></textarea>
        <button type="submit" style="padding: 10px 16px; cursor: pointer; grid-column: 1 / -1;">Create Shipment</button>
      </form>
      <p id="shipment-message" style="margin-top: 12px;"></p>
    </div>

    <div style="padding: 20px; border: 1px solid #ddd; border-radius: 12px;">
      <h2>Shipment Records</h2>
      <div style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; margin-top: 12px;">
          <thead>
            <tr>
              <th style="text-align: left; border-bottom: 1px solid #ddd; padding: 10px;">ID</th>
              <th style="text-align: left; border-bottom: 1px solid #ddd; padding: 10px;">Client</th>
              <th style="text-align: left; border-bottom: 1px solid #ddd; padding: 10px;">Reference</th>
              <th style="text-align: left; border-bottom: 1px solid #ddd; padding: 10px;">Shipping Line</th>
              <th style="text-align: left; border-bottom: 1px solid #ddd; padding: 10px;">Status</th>
              <th style="text-align: left; border-bottom: 1px solid #ddd; padding: 10px;">Created By</th>
              <th style="text-align: left; border-bottom: 1px solid #ddd; padding: 10px;">Created At</th>
              <th style="text-align: left; border-bottom: 1px solid #ddd; padding: 10px;">Action</th>
            </tr>
          </thead>
          <tbody id="shipments-body">
            <tr>
              <td colspan="8" style="padding: 12px;">Loading shipments...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let currentUser = null;

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    async function loadUser() {
      try {
        const response = await fetch("/api/me");

        if (!response.ok) {
          window.location.href = "/login";
          return;
        }

        const data = await response.json();

        if (!data.success || !data.user) {
          window.location.href = "/login";
          return;
        }

        currentUser = data.user;
        document.getElementById("user-username").textContent = currentUser.username || "-";
        document.getElementById("user-role").textContent = currentUser.role || "-";

        if (currentUser.role === "admin" || currentUser.role === "operations") {
          document.getElementById("create-shipment-panel").style.display = "block";
        }
      } catch (error) {
        window.location.href = "/login";
      }
    }

    async function loadShipments() {
      const body = document.getElementById("shipments-body");

      try {
        const response = await fetch("/api/shipments");

        if (!response.ok) {
          body.innerHTML = `<tr><td colspan="8" style="padding:12px;">Could not load shipments.</td></tr>`;
          return;
        }

        const data = await response.json();

        if (!data.success || !Array.isArray(data.shipments) || !data.shipments.length) {
          body.innerHTML = `<tr><td colspan="8" style="padding:12px;">No shipments found.</td></tr>`;
          return;
        }

        body.innerHTML = data.shipments.map((item) => `
          <tr>
            <td style="padding:10px; border-bottom:1px solid #eee;">${item.id}</td>
            <td style="padding:10px; border-bottom:1px solid #eee;">${escapeHtml(item.client_name)}</td>
            <td style="padding:10px; border-bottom:1px solid #eee;">${escapeHtml(item.reference_number)}</td>
            <td style="padding:10px; border-bottom:1px solid #eee;">${escapeHtml(item.shipping_line)}</td>
            <td style="padding:10px; border-bottom:1px solid #eee;">${escapeHtml(item.status)}</td>
            <td style="padding:10px; border-bottom:1px solid #eee;">${escapeHtml(item.created_by)}</td>
            <td style="padding:10px; border-bottom:1px solid #eee;">${new Date(item.created_at).toLocaleString()}</td>
            <td style="padding:10px; border-bottom:1px solid #eee;">
              <a
                href="/registry-detail?id=${item.id}"
                style="padding:6px 10px; cursor:pointer; border:1px solid #ddd; border-radius:8px; text-decoration:none; display:inline-block;"
              >
                View
              </a>
            </td>
          </tr>
        `).join("");
      } catch (error) {
        body.innerHTML = `<tr><td colspan="8" style="padding:12px;">Could not load shipments.</td></tr>`;
      }
    }

    document.getElementById("shipment-form").addEventListener("submit", async function (e) {
      e.preventDefault();

      const message = document.getElementById("shipment-message");
      const payload = {
        client_name: document.getElementById("client_name").value.trim(),
        reference_number: document.getElementById("reference_number").value.trim(),
        shipping_line: document.getElementById("shipping_line").value.trim(),
        cargo_description: document.getElementById("cargo_description").value.trim(),
        status: document.getElementById("status").value.trim() || "Pending",
        origin_port: document.getElementById("origin_port").value.trim(),
        destination_port: document.getElementById("destination_port").value.trim()
      };

      message.textContent = "Creating shipment...";
      message.style.color = "";

      try {
        const response = await fetch("/api/shipments", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok || !data.success) {
          throw new Error(data.error || "Failed to create shipment.");
        }

        message.textContent = `Shipment created: ${data.shipment.reference_number}`;
        message.style.color = "green";
        document.getElementById("shipment-form").reset();
        await loadShipments();
      } catch (error) {
        message.textContent = error.message || "Failed to create shipment.";
        message.style.color = "red";
      }
    });

    document.getElementById("logout-btn").addEventListener("click", async function () {
      try {
        const response = await fetch("/logout", { method: "POST" });
        const data = await response.json();
        window.location.href = data.redirect || "/login";
      } catch (error) {
        window.location.href = "/login";
      }
    });

    async function initPage() {
      await loadUser();
      await loadShipments();
    }

    initPage();
  </script>
</body>
</html>
