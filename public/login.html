<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BE-MCs Login</title>
  <link rel="stylesheet" href="/styles.css" />
</head>

<body class="login-page">

  <div class="login-card">

    <!-- Brand -->
    <div class="login-brand">MarineTraffic Group Limited</div>

    <!-- MAIN TITLE (FIXED) -->
    <h1 class="login-title">BE-MCs</h1>

    <!-- SUBTITLE (FIXED) -->
    <div class="login-subtitle-strong">Bandari Salama</div>

    <!-- Description -->
    <p class="login-subtitle">
      Electronic Monitoring and Control System for secure port operations.
    </p>

    <!-- ALERT -->
    <div id="login-alert" class="alert alert-danger" style="display:none;"></div>

    <!-- FORM -->
    <form id="login-form" class="login-form">

      <div>
        <label>Username</label>
        <input id="username" type="text" placeholder="Enter username" required />
      </div>

      <div>
        <label>Password</label>
        <input id="password" type="password" placeholder="Enter password" required />
      </div>

      <button id="login-btn" type="submit" class="btn-primary">
        Login
      </button>

    </form>

  </div>

  <script>
    const form = document.getElementById("login-form");
    const alertBox = document.getElementById("login-alert");
    const btn = document.getElementById("login-btn");

    function showError(msg) {
      alertBox.textContent = msg;
      alertBox.style.display = "block";
    }

    function hideError() {
      alertBox.style.display = "none";
    }

    function setLoading(state) {
      btn.disabled = state;
      btn.textContent = state ? "Signing in..." : "Login";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      hideError();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !password) {
        showError("Username and password are required.");
        return;
      }

      setLoading(true);

      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
          throw new Error(data.error || "Login failed");
        }

        window.location.href = data.redirect || "/dashboard";

      } catch (err) {
        showError(err.message);
      } finally {
        setLoading(false);
      }
    });
  </script>

</body>
</html>
