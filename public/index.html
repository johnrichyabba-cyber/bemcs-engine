<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BE-MCs</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body style="display:flex; align-items:center; justify-content:center; min-height:100vh;">

  <div class="panel" style="text-align:center; max-width:500px;">

    <div class="brand-kicker">MarineTraffic Group Limited</div>

    <h1 class="page-title">BE-MCs</h1>

    <p class="page-subtitle" style="margin-bottom:20px;">
      Initializing system...
    </p>

    <div id="status-msg" class="msg-info">
      Checking session...
    </div>

  </div>

  <script>
    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      localStorage.setItem("bemcs-theme", theme);
    }

    const savedTheme = localStorage.getItem("bemcs-theme") || "dark";
    applyTheme(savedTheme);

    async function checkSession() {
      try {
        const response = await fetch("/api/me");

        if (!response.ok) {
          window.location.href = "/login";
          return;
        }

        const data = await response.json();

        if (data.success && data.user) {
          document.getElementById("status-msg").innerText = "Session active. Redirecting...";
          setTimeout(() => {
            window.location.href = "/dashboard";
          }, 500);
        } else {
          window.location.href = "/login";
        }

      } catch (error) {
        document.getElementById("status-msg").innerText = "Connection error. Redirecting...";
        setTimeout(() => {
          window.location.href = "/login";
        }, 1000);
      }
    }

    checkSession();
  </script>

</body>
</html>
