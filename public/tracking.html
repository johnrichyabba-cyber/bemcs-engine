<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tracking Module</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body style="font-family: sans-serif; padding: 40px;">
  <div style="max-width: 1200px; margin: 0 auto;">
    <div style="display: flex; justify-content: space-between; align-items: center; gap: 20px; flex-wrap: wrap;">
      <div>
        <h1>🚚 Tracking Module</h1>
        <p>Track shipment movement, status changes, and operational milestones.</p>
      </div>
      <div style="display: flex; gap: 10px; flex-wrap: wrap;">
        <a href="/dashboard" style="padding: 10px 16px; border: 1px solid #ddd; border-radius: 10px; text-decoration: none;">Back to Dashboard</a>
        <button id="logout-btn" style="padding: 10px 16px; cursor: pointer;">Logout</button>
      </div>
    </div>

    <hr style="margin: 24px 0;" />

    <div style="padding: 20px; border: 1px solid #ddd; border-radius: 12px; margin-bottom: 20px;">
      <h2>Current User</h2>
      <p><strong>Username:</strong> <span id="user-username">Loading...</span></p>
      <p><strong>Role:</strong> <span id="user-role">Loading...</span></p>
    </div>

    <div style="padding: 20px; border: 1px solid #ddd; border-radius: 12px; margin-bottom: 20px;">
      <h2>Available Shipments</h2>
      <select id="shipment-select" style="padding: 10px; min-width: 320px;"></select>
      <button id="refresh-tracking-btn" style="padding: 10px 16px; margin-left: 10px; cursor: pointer;">Refresh Timeline</button>
    </div>

    <div id="tracking-form-panel" style="padding: 20px; border: 1px solid #ddd; border-radius: 12px; margin-bottom: 20px; display: none;">
      <h2>Add Tracking Event</h2>
      <form id="tracking-form" style="display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px;">
        <input id="event_status" type="text" placeholder="Event Status e.g. Arrived at Port" required />
        <input id="location_name" type="text" placeholder="Location" required />
        <input id="event_time" type="datetime-local" required />
        <input id="remarks" type="text" placeholder="Remarks (optional)" />
        <button type="submit" style="padding: 10px 16px; cursor: pointer; grid-column: 1 / -1;">Add Tracking Event</button>
      </form>
      <p id="tracking-message" style="margin-top: 12px;"></p>
    </div>

    <div style="padding: 20px; border: 1px solid #ddd; border-radius: 12px; margin-bottom: 20px;">
      <h2>Shipment Summary</h2>
      <div id="shipment-summary">Select a shipment to view summary.</div>
    </div>

    <div style="padding: 20px; border: 1px solid #ddd; border-radius: 12px;">
      <h2>Tracking Timeline</h2>
      <div id="tracking-timeline">
        <p>No shipment selected.</p>
      </div>
    </div>
  </div>

  <script>
    let currentUser = null;
    let shipments = [];

    async function loadUser() {
      const response = await fetch("/api/me");
      if (!response.ok) {
        window.location.href = "/login";
        return;
      }

      const data = await response.json();
      if (!data.success || !data.user) {
        window.location.href = "/login";
        return;
      }

      currentUser = data.user;
      document.getElementById("user-username").textContent = currentUser.username || "-";
      document.getElementById("user-role").textContent = currentUser.role || "-";

      if (currentUser.role === "admin" || currentUser.role === "operations" || currentUser.role === "customs") {
        document.getElementById("tracking-form-panel").style.display = "block";
      }
    }

    async function loadShipments() {
      const response = await fetch("/api/shipments");
      const select = document.getElementById("shipment-select");

      if (!response.ok) {
        select.innerHTML = `<option value="">Could not load shipments</option>`;
        return;
      }

      const data = await response.json();
      shipments = data.shipments || [];

      if (!shipments.length) {
        select.innerHTML = `<option value="">No shipments available</option>`;
        document.getElementById("shipment-summary").innerHTML = "<p>No shipment records yet.</p>";
        return;
      }

      select.innerHTML = shipments.map((item) => `
        <option value="${item.id}">
          ${item.reference_number} - ${item.client_name} (${item.status})
        </option>
      `).join("");

      await loadShipmentTimeline();
    }

    async function loadShipmentTimeline() {
      const shipmentId = document.getElementById("shipment-select").value;
      const summary = document.getElementById("shipment-summary");
      const timeline = document.getElementById("tracking-timeline");

      if (!shipmentId) {
        summary.innerHTML = "<p>No shipment selected.</p>";
        timeline.innerHTML = "<p>No tracking events found.</p>";
        return;
      }

      const response = await fetch(`/api/shipments/${shipmentId}`);
      if (!response.ok) {
        summary.innerHTML = "<p>Could not load shipment summary.</p>";
        timeline.innerHTML = "<p>Could not load timeline.</p>";
        return;
      }

      const data = await response.json();
      const shipment = data.shipment;
      const events = data.tracking_events || [];

      summary.innerHTML = `
        <p><strong>Client:</strong> ${shipment.client_name}</p>
        <p><strong>Reference:</strong> ${shipment.reference_number}</p>
        <p><strong>Shipping Line:</strong> ${shipment.shipping_line}</p>
        <p><strong>Current Status:</strong> ${shipment.status}</p>
        <p><strong>Origin:</strong> ${shipment.origin_port || "-"}</p>
        <p><strong>Destination:</strong> ${shipment.destination_port || "-"}</p>
        <p><strong>Cargo:</strong> ${shipment.cargo_description}</p>
      `;

      if (!events.length) {
        timeline.innerHTML = "<p>No tracking events recorded yet.</p>";
        return;
      }

      timeline.innerHTML = events.map((event) => `
        <div style="padding: 14px; border: 1px solid #ddd; border-radius: 12px; margin-bottom: 12px;">
          <p><strong>Status:</strong> ${event.event_status}</p>
          <p><strong>Location:</strong> ${event.location_name}</p>
          <p><strong>Event Time:</strong> ${new Date(event.event_time).toLocaleString()}</p>
          <p><strong>Remarks:</strong> ${event.remarks || "-"}</p>
          <p><strong>Created By:</strong> ${event.created_by}</p>
        </div>
      `).join("");
    }

    document.getElementById("shipment-select").addEventListener("change", loadShipmentTimeline);
    document.getElementById("refresh-tracking-btn").addEventListener("click", loadShipmentTimeline);

    document.getElementById("tracking-form").addEventListener("submit", async function (e) {
      e.preventDefault();

      const shipmentId = document.getElementById("shipment-select").value;
      const message = document.getElementById("tracking-message");

      const payload = {
        shipment_id: shipmentId,
        event_status: document.getElementById("event_status").value.trim(),
        location_name: document.getElementById("location_name").value.trim(),
        event_time: document.getElementById("event_time").value,
        remarks: document.getElementById("remarks").value.trim()
      };

      message.textContent = "Saving tracking event...";

      try {
        const response = await fetch("/api/tracking-events", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok || !data.success) {
          throw new Error(data.error || "Failed to add tracking event.");
        }

        message.textContent = `Tracking event added: ${data.tracking_event.event_status}`;
        document.getElementById("tracking-form").reset();
        await loadShipments();
      } catch (error) {
        message.textContent = error.message;
      }
    });

    document.getElementById("logout-btn").addEventListener("click", async function () {
      try {
        const response = await fetch("/logout", { method: "POST" });
        const data = await response.json();
        window.location.href = data.redirect || "/login";
      } catch (error) {
        window.location.href = "/login";
      }
    });

    async function initPage() {
      await loadUser();
      await loadShipments();
    }

    initPage();
  </script>
</body>
</html>
