<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audit Log & Activity History</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body style="font-family: sans-serif; padding: 40px;">
  <div style="max-width: 1250px; margin: 0 auto;">
    <div style="display: flex; justify-content: space-between; align-items: center; gap: 20px; flex-wrap: wrap;">
      <div>
        <h1>🧾 Audit Log & Activity History</h1>
        <p>Track who did what, when, and on which system entity.</p>
      </div>
      <div style="display: flex; gap: 10px; flex-wrap: wrap;">
        <a href="/dashboard" style="padding: 10px 16px; border: 1px solid #ddd; border-radius: 10px; text-decoration: none;">Back to Dashboard</a>
        <button id="logout-btn" style="padding: 10px 16px; cursor: pointer;">Logout</button>
      </div>
    </div>

    <hr style="margin: 24px 0;" />

    <div style="padding: 20px; border: 1px solid #ddd; border-radius: 12px; margin-bottom: 20px;">
      <h2>Current User</h2>
      <p><strong>Username:</strong> <span id="user-username">Loading...</span></p>
      <p><strong>Role:</strong> <span id="user-role">Loading...</span></p>
    </div>

    <div style="padding: 20px; border: 1px solid #ddd; border-radius: 12px; margin-bottom: 20px;">
      <h2>Shipment-Specific History</h2>
      <select id="shipment-select" style="padding: 10px; min-width: 320px;"></select>
      <button id="load-shipment-history-btn" style="padding: 10px 16px; margin-left: 10px; cursor: pointer;">Load Shipment History</button>
    </div>

    <div style="padding: 20px; border: 1px solid #ddd; border-radius: 12px; margin-bottom: 20px;">
      <h2>Shipment Activity History</h2>
      <div id="shipment-audit-log">
        <p>No shipment history loaded yet.</p>
      </div>
    </div>

    <div style="padding: 20px; border: 1px solid #ddd; border-radius: 12px;">
      <h2>Recent Global Audit Logs</h2>
      <div id="global-audit-log">
        <p>Loading audit logs...</p>
      </div>
    </div>
  </div>

  <script>
    let shipments = [];

    async function loadUser() {
      const response = await fetch("/api/me");
      if (!response.ok) {
        window.location.href = "/login";
        return;
      }

      const data = await response.json();
      if (!data.success || !data.user) {
        window.location.href = "/login";
        return;
      }

      document.getElementById("user-username").textContent = data.user.username || "-";
      document.getElementById("user-role").textContent = data.user.role || "-";
    }

    async function loadShipments() {
      const response = await fetch("/api/shipments");
      const select = document.getElementById("shipment-select");

      if (!response.ok) {
        select.innerHTML = `<option value="">Could not load shipments</option>`;
        return;
      }

      const data = await response.json();
      shipments = data.shipments || [];

      if (!shipments.length) {
        select.innerHTML = `<option value="">No shipments available</option>`;
        return;
      }

      select.innerHTML = shipments.map((item) => `
        <option value="${item.id}">
          ${item.reference_number} - ${item.client_name}
        </option>
      `).join("");
    }

    function renderLogs(targetId, logs, emptyText) {
      const target = document.getElementById(targetId);

      if (!logs || !logs.length) {
        target.innerHTML = `<p>${emptyText}</p>`;
        return;
      }

      target.innerHTML = logs.map((log) => `
        <div style="padding: 14px; border: 1px solid #ddd; border-radius: 12px; margin-bottom: 12px;">
          <p><strong>Action:</strong> ${log.action_type}</p>
          <p><strong>Actor:</strong> ${log.actor_username}${log.actor_role ? ` (${log.actor_role})` : ""}</p>
          <p><strong>Entity:</strong> ${log.entity_type}${log.entity_id ? ` #${log.entity_id}` : ""}</p>
          <p><strong>Shipment ID:</strong> ${log.shipment_id || "-"}</p>
          <p><strong>Details:</strong> ${log.details || "-"}</p>
          <p><strong>Time:</strong> ${new Date(log.created_at).toLocaleString()}</p>
        </div>
      `).join("");
    }

    async function loadGlobalAuditLogs() {
      const response = await fetch("/api/audit-logs");

      if (!response.ok) {
        document.getElementById("global-audit-log").innerHTML = "<p>Could not load audit logs.</p>";
        return;
      }

      const data = await response.json();
      renderLogs("global-audit-log", data.logs || [], "No audit logs found.");
    }

    async function loadShipmentAuditLogs() {
      const shipmentId = document.getElementById("shipment-select").value;

      if (!shipmentId) {
        document.getElementById("shipment-audit-log").innerHTML = "<p>No shipment selected.</p>";
        return;
      }

      const response = await fetch(`/api/shipments/${shipmentId}/audit-logs`);

      if (!response.ok) {
        document.getElementById("shipment-audit-log").innerHTML = "<p>Could not load shipment history.</p>";
        return;
      }

      const data = await response.json();
      renderLogs("shipment-audit-log", data.logs || [], "No shipment history found.");
    }

    document.getElementById("load-shipment-history-btn").addEventListener("click", loadShipmentAuditLogs);

    document.getElementById("logout-btn").addEventListener("click", async function () {
      try {
        const response = await fetch("/logout", { method: "POST" });
        const data = await response.json();
        window.location.href = data.redirect || "/login";
      } catch (error) {
        window.location.href = "/login";
      }
    });

    async function initPage() {
      await loadUser();
      await loadShipments();
      await loadGlobalAuditLogs();
    }

    initPage();
  </script>
</body>
</html>
