<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="refresh" content="0; url=/login" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BE-MCs</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body style="padding: 24px;">
  <div class="page-shell" style="max-width: 900px;">
    <section class="panel" style="text-align: center; min-height: 60vh; display: flex; flex-direction: column; justify-content: center;">
      <div class="brand-kicker" style="margin-bottom: 10px;">MarineTraffic Group Limited</div>
      <h1 class="page-title" style="margin-bottom: 10px;">BE-MCs</h1>
      <p class="page-subtitle" style="max-width: 620px; margin: 0 auto 18px auto;">
        Redirecting to secure access...
      </p>

      <div class="topbar-actions" style="justify-content: center;">
        <a href="/login" class="btn-primary">Go to Login</a>
        <a href="/dashboard" class="btn-outline">Open Dashboard</a>
      </div>
    </section>
  </div>

  <script>
    const savedTheme = localStorage.getItem("bemcs-theme") || "dark";
    document.documentElement.setAttribute("data-theme", savedTheme);

    setTimeout(() => {
      window.location.replace("/login");
    }, 150);
  </script>
</body>
</html>
